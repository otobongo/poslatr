services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: poslatr
      POSTGRES_PASSWORD: poslatr
      POSTGRES_DB: poslatr
    ports:
      - "5432:5432"
    volumes:
      - poslatr-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poslatr -d poslatr"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - poslatr-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: poslatr-dev
      MINIO_ROOT_PASSWORD: poslatr-dev-secret-change-me
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - poslatr-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-bootstrap:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    # minio/mc's default entrypoint is `mc` itself; override to a shell so the
    # chained alias/mb/anonymous commands below can run as a single command.
    entrypoint: [""]
    command: >
      /bin/sh -c "
      mc alias set poslatr-minio http://minio:9000 poslatr-dev poslatr-dev-secret-change-me &&
      mc mb --ignore-existing poslatr-minio/poslatr-media &&
      mc anonymous set none poslatr-minio/poslatr-media
      "

volumes:
  poslatr-postgres-data:
  poslatr-redis-data:
  poslatr-minio-data:
