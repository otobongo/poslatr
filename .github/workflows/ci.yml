name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    # Postgres 16 per PRD section 2. The db integration tests (claim race,
    # workspace scoping) skip without DATABASE_URL, so CI must provide one or
    # they silently cover nothing.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: poslatr
          POSTGRES_PASSWORD: poslatr
          POSTGRES_DB: poslatr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U poslatr -d poslatr"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      # Redis 7 for the ISS-007 scheduler tests (BullMQ queues, two-worker
      # exactly-once, delayed jobs). They skip without REDIS_URL.
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://poslatr:poslatr@localhost:5432/poslatr
      # The worker scheduler suite uses its own DB so its connection/credential
      # fixtures don't contend with the vault suite's global psl_credentials ops.
      WORKER_DATABASE_URL: postgres://poslatr:poslatr@localhost:5432/poslatr_worker
      REDIS_URL: redis://localhost:6379
      MINIO_TEST_ENDPOINT: localhost
      MINIO_TEST_PORT: "9000"
      MINIO_TEST_ACCESS_KEY: poslatr-dev
      MINIO_TEST_SECRET_KEY: poslatr-dev-secret-change-me
      MINIO_TEST_BUCKET: poslatr-media

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # pnpm version comes from the packageManager field in package.json
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      # MinIO as an explicit background container: the `server` subcommand and
      # bucket bootstrap are awkward to express as a GitHub service, so run it
      # directly and wait for health. Feeds the ISS-006 media integration tests.
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=poslatr-dev \
            -e MINIO_ROOT_PASSWORD=poslatr-dev-secret-change-me \
            minio/minio:RELEASE.2025-09-07T16-13-09Z server /data
          echo "waiting for MinIO to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live >/dev/null; then
              echo "MinIO is ready"; break
            fi
            sleep 2
          done
          # Bootstrap a private bucket with the mc client (denies anonymous access).
          docker run --rm --network host \
            --entrypoint sh minio/mc:RELEASE.2025-08-13T08-35-41Z -c "
              mc alias set local http://localhost:9000 poslatr-dev poslatr-dev-secret-change-me &&
              mc mb --ignore-existing local/poslatr-media &&
              mc anonymous set none local/poslatr-media
            "

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # PRD 3.2: core code must never reference a provider id. Zero matches
      # outside packages/providers is a hard gate. Case-insensitive, and the
      # denylist grows as concrete providers land (ISS-005-F2). Comments are
      # scanned too: a provider id has no business in core even in prose.
      - name: Provider-agnosticism check
        run: |
          # git grep scans only tracked source, so build output like .next/
          # (which carries provider names in Next's bot list) can never trip it.
          if git grep -niE "mastodon|bluesky|instagram|linkedin|facebook" -- apps/ packages/core packages/db; then
            echo "::error::provider id referenced outside packages/providers (PRD 3.2)"
            exit 1
          fi
          echo "provider-agnosticism check clean"

      - name: Migrate database
        run: pnpm --filter @poslatr/db db:migrate

      - name: Create and migrate the worker test database
        run: |
          PGPASSWORD=poslatr psql -h localhost -U poslatr -d postgres \
            -c "CREATE DATABASE poslatr_worker OWNER poslatr;"
          DATABASE_URL="$WORKER_DATABASE_URL" pnpm --filter @poslatr/db db:migrate

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Audit
        run: pnpm audit --audit-level=high
