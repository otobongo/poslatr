name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    # Postgres 16 per PRD section 2. The db integration tests (claim race,
    # workspace scoping) skip without DATABASE_URL, so CI must provide one or
    # they silently cover nothing.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: poslatr
          POSTGRES_PASSWORD: poslatr
          POSTGRES_DB: poslatr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U poslatr -d poslatr"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://poslatr:poslatr@localhost:5432/poslatr

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # pnpm version comes from the packageManager field in package.json
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # PRD 3.2: core code must never reference a provider id. Zero matches
      # outside packages/providers is a hard gate. Case-insensitive, and the
      # denylist grows as concrete providers land (ISS-005-F2). Comments are
      # scanned too: a provider id has no business in core even in prose.
      - name: Provider-agnosticism check
        run: |
          # git grep scans only tracked source, so build output like .next/
          # (which carries provider names in Next's bot list) can never trip it.
          if git grep -niE "mastodon|bluesky|instagram|linkedin|facebook" -- apps/ packages/core packages/db; then
            echo "::error::provider id referenced outside packages/providers (PRD 3.2)"
            exit 1
          fi
          echo "provider-agnosticism check clean"

      - name: Migrate database
        run: pnpm --filter @poslatr/db db:migrate

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Audit
        run: pnpm audit --audit-level=high
